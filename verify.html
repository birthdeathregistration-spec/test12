{% extends "base.html" %}
{% block title %}পরিচয় যাচাই{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <div class="card">
      <div class="card-header py-3 text-center">
        <h4 class="mb-0">🔍 পরিচয় যাচাই</h4>
        <small style="opacity:.8">{{ email }}</small>
      </div>
      <div class="card-body p-4">

        <!-- Tab navigation -->
        <ul class="nav nav-pills nav-fill mb-4" id="verifyTab" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#face-tab">
              📷 ফেস ভেরিফিকেশন
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#qr-tab">
              📱 QR কোড
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- Face tab -->
          <div class="tab-pane fade show active" id="face-tab">
            <form method="post" enctype="multipart/form-data">
              <div class="mb-3">
                <label class="form-label fw-semibold">আপনার ছবি আপলোড করুন</label>
                <input class="form-control" type="file" name="photo" accept="image/*" required>
                <div class="form-text">Signup-এর সময় দেওয়া ছবির মতো স্পষ্ট ছবি দিন।</div>
              </div>
              <button class="btn btn-primary w-100 py-2 fw-semibold">মুখ দিয়ে যাচাই করুন →</button>
            </form>
          </div>

          <!-- QR tab -->
          <div class="tab-pane fade" id="qr-tab">
            <form method="post" enctype="multipart/form-data">
              <div class="mb-3">
                <label class="form-label fw-semibold">QR কোড ইমেজ আপলোড করুন</label>
                <input class="form-control" type="file" name="qr_code" accept="image/*" required>
                <div class="form-text">Signup-এর পর ডাউনলোড করা QR কোড ছবিটি দিন।</div>
              </div>
              <button class="btn btn-success w-100 py-2 fw-semibold">QR দিয়ে যাচাই করুন →</button>
            </form>
          </div>
        </div>

        <hr class="my-4">
        <div class="text-center">
          <p class="text-muted mb-2">উপরের পদ্ধতি কাজ না করলে:</p>
          <a href="{{ url_for('otp', email=email) }}" class="btn btn-outline-secondary">
            🔢 OTP দিয়ে যাচাই করুন
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
